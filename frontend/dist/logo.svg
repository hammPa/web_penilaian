<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0AC5F"/>
      <stop offset="55%" stop-color="#C8933E"/>
      <stop offset="100%" stop-color="#96691F"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5c3d10" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)"/>

  <!-- Top shine overlay -->
  <rect x="16" y="16" width="480" height="240" rx="108" fill="url(#shine)"/>

  <!-- Subtle ring accent -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Monogram 5P -->
  <text x="256" y="300" font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="220" fill="#FFFFFF" text-anchor="middle" letter-spacing="-6"
        filter="url(#softShadow)">5P</text>

  <!-- Small accent dot -->
  <circle cx="380" cy="150" r="14" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
